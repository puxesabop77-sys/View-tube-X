<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOVA SHORTS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════
   NOVA SHORTS — Infinite Scroll
   Made in India 🇮🇳 By Sufiyan Absar
   © 2014 All Rights Reserved
═══════════════════════════ */

:root{
  --a:#7c3aed; --b:#06b6d4; --c:#f43f5e; --d:#10b981;
  --bg:#04040a; --txt:#f0efff; --dim:#6b7280;
  --ga:0 0 40px rgba(124,58,237,.5);
  --gb:0 0 40px rgba(6,182,212,.5);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none}

/* ── CURSOR ── */
#dot{position:fixed;width:8px;height:8px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:exclusion}
#ring{position:fixed;width:38px;height:38px;border:1.5px solid rgba(255,255,255,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s}

/* ── TAP TO START overlay ── */
#tap{
  position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  cursor:pointer;backdrop-filter:blur(10px);
  transition:opacity .5s;
}
#tap.gone{opacity:0;pointer-events:none}
.tap-ico{
  width:88px;height:88px;border-radius:50%;
  background:rgba(124,58,237,.15);border:2px solid var(--a);
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:var(--ga);animation:tapP 1.6s ease-in-out infinite;
}
@keyframes tapP{0%,100%{transform:scale(1);box-shadow:var(--ga)}50%{transform:scale(1.1);box-shadow:0 0 70px rgba(124,58,237,.7)}}
.tap-lbl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;color:#fff}
.tap-sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:3px}

/* ── BACK TO HOME ── */
#homeBtn{
  position:fixed;top:18px;left:18px;z-index:7000;
  width:44px;height:44px;border-radius:50%;
  background:rgba(4,4,10,.75);border:1px solid rgba(255,255,255,.15);
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);transition:all .3s;
}
#homeBtn:hover{border-color:var(--b);color:var(--b);box-shadow:var(--gb)}

/* Title badge top-center */
#topBadge{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:7000;
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;
  background:linear-gradient(90deg,var(--b),var(--a));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  pointer-events:none;
}

/* ── SCROLL FEED ── */
#feed{
  position:fixed;inset:0;
  overflow-y:scroll;scroll-snap-type:y mandatory;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
#feed::-webkit-scrollbar{display:none}

/* ── SLIDE ── */
.slide{
  width:100%;height:100vh;
  scroll-snap-align:start;scroll-snap-stop:always;
  position:relative;background:#000;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* Per-slide ambient glow */
.s-glow{position:absolute;inset:0;pointer-events:none;z-index:0;transition:background .6s}

/* Video inner — portrait container */
.s-inner{
  position:relative;z-index:2;
  width:min(420px,100vw);height:100%;
  overflow:hidden;background:#000;
}

/* Iframe */
.s-iframe-wrap{position:absolute;inset:0}
.s-iframe-wrap iframe{width:100%;height:100%;border:none;display:block}

/* Thumbnail */
.s-thumb{
  position:absolute;inset:0;z-index:4;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:opacity .5s;
}
.s-thumb img{width:100%;height:100%;object-fit:cover;filter:brightness(.55)}
.s-thumb.gone{opacity:0;pointer-events:none}

/* Play button on thumb */
.s-playbtn{
  position:absolute;width:68px;height:68px;border-radius:50%;
  background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;
  backdrop-filter:blur(8px);animation:playPulse 2s ease-in-out infinite;
  transition:transform .3s;
}
.s-playbtn:hover{transform:scale(1.15)}
@keyframes playPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.2)}50%{box-shadow:0 0 0 20px rgba(255,255,255,0)}}

/* Bottom gradient */
.s-gradient{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,transparent 20%,transparent 50%,rgba(0,0,0,.7) 80%,rgba(0,0,0,.97) 100%);
}

/* Bottom info */
.s-info{
  position:absolute;bottom:0;left:0;right:56px;
  padding:14px 14px 28px;z-index:6;
}
.s-title{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;line-height:1.45;
  color:#fff;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  text-shadow:0 2px 10px rgba(0,0,0,.9);
}
.s-ch{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.s-ch-img{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.5);object-fit:cover;flex-shrink:0}
.s-ch-name{font-size:13px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9)}
.s-sub{
  padding:4px 13px;border-radius:14px;border:1px solid rgba(255,255,255,.7);
  background:rgba(255,255,255,.1);color:#fff;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Space Mono',monospace;transition:all .3s;backdrop-filter:blur(4px);
}
.s-sub:hover{background:rgba(255,255,255,.25)}
.s-sub.done{background:var(--a);border-color:var(--a)}

/* Progress bar */
.s-prog{
  position:absolute;bottom:0;left:0;right:0;height:3px;z-index:7;
  background:rgba(255,255,255,.15);
}
.s-prog-f{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--a),var(--b));
  box-shadow:0 0 8px var(--b);
}

/* Side actions */
.s-acts{
  position:absolute;right:8px;bottom:80px;z-index:6;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.s-act{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;color:#fff;cursor:pointer;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.9));
  font-family:'Space Mono',monospace;transition:transform .25s;
}
.s-act:hover{transform:scale(1.25)}
.s-act-ico{font-size:28px;line-height:1}
.s-act-lbl{font-size:10px;font-weight:700;letter-spacing:.5px}
.s-act.liked .s-act-ico{filter:drop-shadow(0 0 10px #ff4d6d)}

/* Mute badge */
.s-muted{
  position:absolute;top:68px;right:12px;z-index:7;
  background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);
  border-radius:20px;padding:5px 12px;color:#fff;
  font-size:11px;font-family:'Space Mono',monospace;font-weight:700;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  backdrop-filter:blur(8px);animation:slideDown .3s ease;
}
.s-muted.hidden{display:none}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}}

/* PP flash */
.pp{
  position:absolute;inset:0;z-index:8;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
}
.pp-ico{
  width:66px;height:66px;border-radius:50%;
  background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.75);
  display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;
}
.pp.show{animation:ppAnim .5s ease forwards}
@keyframes ppAnim{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.3)}}

/* Loading indicator (appended at bottom during fetch) */
.load-indicator{
  height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;background:#000;
}
.spin{
  width:44px;height:44px;border-radius:50%;
  border:3px solid rgba(124,58,237,.2);border-top-color:var(--a);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-lbl{font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:3px}

/* ── RIGHT PANEL (nav/mute/pause) ── */
#rpanel{
  position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:7000;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  background:rgba(4,4,10,.8);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.07);border-radius:14px 0 0 14px;
  padding:12px 8px;
}
.rp-btn{
  width:42px;height:42px;border-radius:50%;
  background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);
  font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.rp-btn:hover{border-color:var(--b);color:var(--b);box-shadow:var(--gb)}
.rp-btn.muted{border-color:var(--c);color:var(--c)}

/* Scroll dots */
#dots{
  position:fixed;right:58px;top:50%;transform:translateY(-50%);z-index:7000;
  display:flex;flex-direction:column;gap:5px;pointer-events:none;
}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .35s}
.sdot.on{height:18px;border-radius:3px;background:var(--b);box-shadow:var(--gb)}

/* Toast */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(14,14,28,.9);border:1px solid rgba(124,58,237,.3);
  color:#fff;padding:11px 24px;border-radius:10px;z-index:9999;
  font-size:13px;font-family:'Space Mono',monospace;letter-spacing:.5px;
  opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);
  backdrop-filter:blur(16px);white-space:nowrap;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Watermark */
.wm{
  position:fixed;bottom:14px;right:14px;z-index:6999;pointer-events:none;
  font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.1);
  letter-spacing:1px;text-align:right;line-height:1.8;
}
</style>
</head>
<body>

<!-- Cursor -->
<div id="dot"></div>
<div id="ring"></div>

<!-- Tap to start -->
<div id="tap" onclick="unlock()">
  <div class="tap-ico">▶</div>
  <p class="tap-lbl">TAP TO START</p>
  <p class="tap-sub">ENABLE AUTOPLAY</p>
</div>

<!-- Home button -->
<button id="homeBtn" onclick="location.href='index.html'" title="Home">⌂</button>

<!-- Title -->
<div id="topBadge">SHORTS</div>

<!-- Right panel -->
<div id="rpanel">
  <button class="rp-btn" id="upBtn" onclick="nav(-1)" title="Up">▲</button>
  <button class="rp-btn" id="dnBtn" onclick="nav(1)" title="Down">▼</button>
  <button class="rp-btn" id="muteBtn" onclick="toggleMute()" title="Mute">🔊</button>
  <button class="rp-btn" id="pauseBtn" onclick="togglePause()" title="Pause">⏸</button>
</div>

<!-- Scroll dots -->
<div id="dots"></div>

<!-- Feed -->
<div id="feed"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Watermark -->
<div class="wm">🇮🇳 Made in India<br>By Sufiyan Absar<br>© 2014</div>

<script>
/* ═══════════════════════════════════
   NOVA SHORTS
   Made in India 🇮🇳 By Sufiyan Absar
═══════════════════════════════════ */

const KEY  = 'AIzaSyDTJfnHa3zmUUu__wc2VEL5oRzIgij6kcQ';
const BASE = 'https://www.googleapis.com/youtube/v3';
const $    = id => document.getElementById(id);

// ── API ──
const api = async (ep, p) => {
  p.key = KEY;
  const r = await fetch(`${BASE}/${ep}?${new URLSearchParams(p)}`);
  if(!r.ok) throw new Error(r.status);
  return r.json();
};

const ago = d => {
  const s = (Date.now()-new Date(d))/1000;
  return s<60?'just now':s<3600?Math.floor(s/60)+'m':s<86400?Math.floor(s/3600)+'h':Math.floor(s/86400)+'d';
};
const toast = msg => {
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
};

// ── CURSOR ──
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;$('dot').style.cssText=`left:${mx}px;top:${my}px`});
(function rl(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;$('ring').style.left=rx+'px';$('ring').style.top=ry+'px';requestAnimationFrame(rl)})();

// ── STATE ──
let unlocked   = false;   // autoplay unlocked?
let muted      = false;   // global mute
let paused     = false;   // global pause
let curIdx     = 0;       // current visible slide index
let slides     = [];      // array of loaded video data
let fetching   = false;   // currently fetching more?
let pageTokens = [];      // search page tokens per query rotation
let queryIdx   = 0;       // which query to use next
let totalLoaded = 0;

// Query rotation — keeps shorts truly infinite by rotating topics
const QUERIES = [
  {q:'#shorts', dur:'short'},
  {q:'shorts india', dur:'short'},
  {q:'funny shorts', dur:'short'},
  {q:'trending shorts india', dur:'short'},
  {q:'viral reels shorts', dur:'short'},
  {q:'comedy shorts india', dur:'short'},
  {q:'gaming shorts', dur:'short'},
  {q:'music shorts india', dur:'short'},
];

// Color palettes per slide
const PALS = [
  ['#7c3aed','#06b6d4'],
  ['#f43f5e','#7c3aed'],
  ['#06b6d4','#10b981'],
  ['#f43f5e','#06b6d4'],
  ['#10b981','#7c3aed'],
  ['#fbbf24','#f43f5e'],
];

// ── UNLOCK AUTOPLAY ──
function unlock() {
  unlocked = true;
  $('tap').classList.add('gone');
  // Play current slide
  playSlide(curIdx);
}

// ── FETCH MORE VIDEOS ──
async function fetchMore() {
  if(fetching) return;
  fetching = true;

  // Show loading indicator at bottom
  const li = document.createElement('div');
  li.className = 'load-indicator';
  li.id = 'loadIndi';
  li.innerHTML = `<div class="spin"></div><p class="spin-lbl">LOADING MORE</p>`;
  $('feed').appendChild(li);

  try {
    const q = QUERIES[queryIdx % QUERIES.length];
    const p = {
      part: 'snippet',
      q: q.q,
      type: 'video',
      videoDuration: q.dur,
      maxResults: 10,
      regionCode: 'IN',
      order: 'relevance'
    };
    // Use stored token for this query slot if available
    const tkKey = queryIdx % QUERIES.length;
    if(pageTokens[tkKey]) p.pageToken = pageTokens[tkKey];

    const d = await api('search', p);
    pageTokens[tkKey] = d.nextPageToken || null;
    queryIdx++;

    const items = (d.items || []).filter(i => i.id?.videoId);

    // Remove loading indicator
    document.getElementById('loadIndi')?.remove();

    if(items.length === 0) {
      // Rotate query and try again
      fetching = false;
      await fetchMore();
      return;
    }

    items.forEach(item => {
      const id = item.id.videoId;
      const s  = item.snippet || {};
      const idx = slides.length;
      slides.push({id, snippet:s});
      buildSlide(id, s, idx);
    });

    totalLoaded = slides.length;
    rebuildDots();

  } catch(e) {
    document.getElementById('loadIndi')?.remove();
    console.error('fetch error', e);
  }

  fetching = false;
}

// ── BUILD ONE SLIDE ──
function buildSlide(id, s, idx) {
  const feed  = $('feed');
  const pal   = PALS[idx % PALS.length];
  const thumb = s.thumbnails?.maxres?.url || s.thumbnails?.high?.url || s.thumbnails?.medium?.url || '';
  const chImg = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.channelTitle||'?')}&background=${pal[0].slice(1)}&color=fff&size=30&bold=true`;

  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.idx = idx;
  slide.dataset.vid = id;

  slide.innerHTML = `
    <div class="s-glow" style="background:radial-gradient(circle at 25% 50%,${pal[0]}28,transparent 55%),radial-gradient(circle at 75% 50%,${pal[1]}18,transparent 55%)"></div>

    <div class="s-inner" id="si-${idx}">
      <!-- Iframe container -->
      <div class="s-iframe-wrap" id="iw-${idx}"></div>

      <!-- Thumbnail (shown until iframe loads) -->
      <div class="s-thumb" id="st-${idx}" onclick="onThumbClick(${idx})">
        <img src="${thumb}" alt="" onerror="this.src='https://placehold.co/400x700/0e0e1c/7c3aed?text=NOVA'">
        <div class="s-playbtn">▶</div>
      </div>

      <!-- PP flash -->
      <div class="pp" id="pp-${idx}"><div class="pp-ico" id="ppi-${idx}">▶</div></div>

      <!-- Mute badge -->
      <div class="s-muted hidden" id="mb-${idx}" onclick="toggleMute()">🔇 TAP TO UNMUTE</div>

      <div class="s-gradient"></div>

      <!-- Side actions -->
      <div class="s-acts">
        <button class="s-act" id="la-${idx}" onclick="likeSlide(${idx},event)">
          <span class="s-act-ico">🤍</span><span class="s-act-lbl">Like</span>
        </button>
        <button class="s-act" onclick="shareSlide('${id}',event)">
          <span class="s-act-ico">🔗</span><span class="s-act-lbl">Share</span>
        </button>
        <button class="s-act" onclick="watchFull('${id}',event)">
          <span class="s-act-ico">🎬</span><span class="s-act-lbl">Watch</span>
        </button>
      </div>

      <!-- Bottom info -->
      <div class="s-info">
        <p class="s-title">${s.title || ''}</p>
        <div class="s-ch">
          <img class="s-ch-img" src="${chImg}" alt="">
          <span class="s-ch-name">${s.channelTitle || ''}</span>
          <button class="s-sub" id="sb-${idx}" onclick="subSlide(${idx},event)">Subscribe</button>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="s-prog"><div class="s-prog-f" id="pf-${idx}"></div></div>
    </div>`;

  feed.appendChild(slide);
}

// ── PLAY A SLIDE ──
function playSlide(idx) {
  const item = slides[idx];
  if(!item) return;
  const id   = item.id;
  const wrap = $(`iw-${idx}`);
  if(!wrap) return;

  const existing = wrap.querySelector('iframe');
  if(existing) {
    // Already loaded → just play
    postYT(existing, 'playVideo');
    startProg(idx);
    return;
  }

  // Build src — start muted to guarantee play, unmute after load
  const src = [
    `https://www.youtube.com/embed/${id}`,
    `?autoplay=1`,
    `&mute=1`,
    `&loop=1`,
    `&playlist=${id}`,
    `&controls=0`,
    `&rel=0`,
    `&playsinline=1`,
    `&modestbranding=1`,
    `&enablejsapi=1`,
    `&origin=${encodeURIComponent(location.origin)}`
  ].join('');

  const iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
  iframe.allowFullscreen = true;
  iframe.style.cssText = 'width:100%;height:100%;border:none;display:block';

  let loaded = false;
  iframe.addEventListener('load', () => {
    if(loaded) return;
    loaded = true;

    // Hide thumbnail
    const th = $(`st-${idx}`);
    if(th) th.classList.add('gone');

    // Unmute if user hasn't muted globally
    if(!muted) {
      setTimeout(() => postYT(iframe, 'unMute'), 700);
    }
    updateMuteBadges();
    startProg(idx);
  });

  wrap.appendChild(iframe);
}

// ── STOP A SLIDE ──
function stopSlide(idx) {
  const iframe = $(`iw-${idx}`)?.querySelector('iframe');
  if(iframe) postYT(iframe, 'pauseVideo');
  // Reset progress
  const pf = $(`pf-${idx}`);
  if(pf) { pf.style.transition='none'; pf.style.width='0%'; }
}

// ── PROGRESS BAR ──
function startProg(idx) {
  const pf = $(`pf-${idx}`);
  if(!pf) return;
  pf.style.transition = 'none';
  pf.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    pf.style.transition = 'width 59s linear';
    pf.style.width = '100%';
  }));
}

// ── YOUTUBE POSTMESSAGE ──
function postYT(iframe, func, args=[]) {
  try { iframe.contentWindow.postMessage(JSON.stringify({event:'command',func,args}),'*'); } catch(_) {}
}

// ── INTERSECTION OBSERVER — core infinite scroll logic ──
let io = null;
function setupIO() {
  if(io) io.disconnect();
  io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const idx = parseInt(e.target.dataset.idx);
      if(e.isIntersecting) {
        curIdx = idx;
        updateDots(idx);

        // Play if unlocked
        if(unlocked && !paused) playSlide(idx);

        // Load more when reaching last 3 slides
        if(idx >= slides.length - 3 && !fetching) {
          fetchMore();
        }

      } else {
        stopSlide(idx);
      }
    });
  }, { threshold: 0.75 });

  document.querySelectorAll('.slide').forEach(el => io.observe(el));
}

// ── DOTS ──
function rebuildDots() {
  const dc = $('dots'); dc.innerHTML = '';
  // Show max 8 dots for performance
  const show = Math.min(slides.length, 8);
  for(let i=0;i<show;i++){
    const d = document.createElement('div');
    d.className = 'sdot' + (i===curIdx?' on':'');
    d.id = `dot-${i}`;
    dc.appendChild(d);
  }
}
function updateDots(idx) {
  const n = Math.min(slides.length, 8);
  for(let i=0;i<n;i++){
    const d = document.getElementById(`dot-${i}`);
    if(d) d.classList.toggle('on', i===idx%n);
  }
}

// ── NAVIGATE ──
function nav(dir) {
  const all = document.querySelectorAll('.slide');
  const next = Math.max(0, Math.min(all.length-1, curIdx+dir));
  all[next]?.scrollIntoView({behavior:'smooth'});
}

// ── MUTE ──
function toggleMute() {
  muted = !muted;
  const btn = $('muteBtn');
  btn.textContent = muted ? '🔇' : '🔊';
  btn.classList.toggle('muted', muted);

  const iframe = $(`iw-${curIdx}`)?.querySelector('iframe');
  if(iframe) postYT(iframe, muted ? 'mute' : 'unMute');

  updateMuteBadges();
  toast(muted ? '🔇 Muted' : '🔊 Unmuted');
}
function updateMuteBadges() {
  document.querySelectorAll('[id^="mb-"]').forEach(b => b.classList.toggle('hidden', !muted));
}

// ── PAUSE ──
function togglePause() {
  paused = !paused;
  $('pauseBtn').textContent = paused ? '▶' : '⏸';

  const iframe = $(`iw-${curIdx}`)?.querySelector('iframe');
  if(iframe) postYT(iframe, paused ? 'pauseVideo' : 'playVideo');

  // Flash
  const pp   = $(`pp-${curIdx}`);
  const ppi  = $(`ppi-${curIdx}`);
  if(pp && ppi) {
    ppi.textContent = paused ? '⏸' : '▶';
    pp.classList.remove('show');
    void pp.offsetWidth;
    pp.classList.add('show');
  }
  toast(paused ? '⏸ Paused' : '▶ Playing');
}

// ── THUMB CLICK ──
function onThumbClick(idx) {
  if(!unlocked) { unlock(); return; }
  playSlide(idx);
}

// ── ACTIONS ──
function likeSlide(idx, e) {
  e?.stopPropagation();
  const btn = $(`la-${idx}`);
  const liked = btn.classList.toggle('liked');
  btn.querySelector('.s-act-ico').textContent = liked ? '❤️' : '🤍';
  toast(liked ? '❤️ Liked!' : 'Removed like');
}
function shareSlide(id, e) {
  e?.stopPropagation();
  navigator.clipboard?.writeText(`https://view-tube-x.vercel.app/player.html?v=${id}`)
    .then(() => toast('🔗 Link copied!'));
}
function watchFull(id, e) {
  e?.stopPropagation();
  // Open full player back on index page
  location.href = `index.html?v=${id}`;
}
function subSlide(idx, e) {
  e?.stopPropagation();
  const btn = $(`sb-${idx}`);
  btn.classList.toggle('done');
  btn.textContent = btn.classList.contains('done') ? '✓ Subscribed' : 'Subscribe';
  toast(btn.classList.contains('done') ? '🔔 Subscribed!' : 'Unsubscribed');
}

// ── TOUCH SWIPE ──
let ty = 0;
$('feed').addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, {passive:true});
$('feed').addEventListener('touchend', e => {
  const dy = ty - e.changedTouches[0].clientY;
  if(Math.abs(dy) > 55) nav(dy > 0 ? 1 : -1);
}, {passive:true});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if(e.key==='ArrowDown'||e.key==='j') nav(1);
  if(e.key==='ArrowUp'||e.key==='k') nav(-1);
  if(e.key===' '||e.key==='p') { e.preventDefault(); if(unlocked) togglePause(); }
  if(e.key==='m') toggleMute();
  if(e.key==='Escape') location.href='index.html';
});

// ── INIT ──
async function init() {
  // Load first 3 batches so user has content right away
  await fetchMore();
  await fetchMore();
  await fetchMore();
  setupIO();
  rebuildDots();
}

init();
</script>
</body>
</html>
