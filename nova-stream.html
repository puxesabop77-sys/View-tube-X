<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA STREAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   NOVA STREAM — Full Animated Video App
   Made in India 🇮🇳 By Sufiyan Absar
   © 2014 Sufiyan Absar. All Rights Reserved.
════════════════════════════════════════ */

:root {
  --bg:     #050507;
  --bg2:    #0a0a10;
  --bg3:    #10101a;
  --card:   #0d0d18;
  --a:      #7c3aed;
  --b:      #06b6d4;
  --c:      #f43f5e;
  --d:      #10b981;
  --text:   #f1f0ff;
  --muted:  #6b7280;
  --border: rgba(124,58,237,0.2);
  --glow-a: 0 0 30px rgba(124,58,237,0.4);
  --glow-b: 0 0 30px rgba(6,182,212,0.4);
  --glow-c: 0 0 30px rgba(244,63,94,0.4);
  --r: 14px;
}

*,*::before,*::after { margin:0;padding:0;box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── CANVAS BG ── */
#bgCanvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0.55;
}

/* ── NOISE OVERLAY ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
}

/* ── CURSOR ── */
#cur { position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:exclusion; }
#cur-dot { width:8px;height:8px;background:#fff;border-radius:50%;position:absolute;transform:translate(-50%,-50%);transition:width .2s,height .2s; }
#cur-ring { width:40px;height:40px;border:1px solid rgba(255,255,255,0.4);border-radius:50%;position:absolute;transform:translate(-50%,-50%);transition:all .15s ease; }

/* ── HEADER ── */
header {
  position: fixed; top:0; left:0; right:0; z-index: 1000;
  height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  background: rgba(5,5,7,0.7);
  backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
}
header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--a), var(--b), var(--c), transparent);
  animation: scanLine 4s linear infinite;
  background-size: 300% 100%;
}
@keyframes scanLine { 0%{background-position:200%} 100%{background-position:-200%} }

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 4px;
  background: linear-gradient(90deg, var(--b), var(--a), var(--c));
  background-size: 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: logoShift 4s linear infinite;
  cursor: pointer;
}
@keyframes logoShift { 0%{background-position:0%} 100%{background-position:200%} }
.logo span { font-size:12px; letter-spacing:8px; display:block; margin-top:-6px; opacity:0.5; -webkit-text-fill-color:rgba(255,255,255,0.5); }

/* ── SEARCH BAR ── */
.search-wrap {
  flex: 1; max-width: 520px; margin: 0 32px;
  position: relative;
}
.search-wrap::before {
  content: '';
  position: absolute; inset: -1px; border-radius: 30px;
  background: linear-gradient(90deg, var(--a), var(--b), var(--c), var(--a));
  background-size: 300%;
  animation: borderAnim 3s linear infinite;
  opacity: 0; transition: opacity .3s;
  z-index: 0;
}
.search-wrap:focus-within::before { opacity: 1; }
@keyframes borderAnim { 0%{background-position:0%} 100%{background-position:300%} }

.search-inner {
  position: relative; z-index: 1;
  display: flex; align-items: center;
  background: var(--bg2);
  border-radius: 30px; overflow: hidden;
  border: 1px solid var(--border);
}
.search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px;
  padding: 12px 20px;
  letter-spacing: 0.3px;
}
.search-input::placeholder { color: var(--muted); }
.search-btn {
  width: 48px; height: 48px; background: none; border: none;
  color: var(--muted); cursor: pointer; font-size: 18px;
  transition: color .2s; display:flex;align-items:center;justify-content:center;
}
.search-btn:hover { color: var(--b); }

.nav-right { display:flex;align-items:center;gap:10px; }
.nav-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--muted); font-size: 16px; cursor: pointer;
  display:flex;align-items:center;justify-content:center;
  transition: all .3s; position:relative;
}
.nav-btn:hover { color: var(--b); border-color: var(--b); box-shadow: var(--glow-b); }
.nav-btn.active { color: var(--a); border-color: var(--a); box-shadow: var(--glow-a); }

/* ── CATEGORY PILLS ── */
.cats {
  position: fixed; top: 70px; left: 0; right: 0; z-index: 900;
  display: flex; gap: 10px; padding: 14px 28px;
  background: rgba(5,5,7,0.85); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.cats::-webkit-scrollbar { display: none; }
.cat {
  white-space: nowrap; padding: 8px 20px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--muted); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .3s; letter-spacing: 0.5px;
  position: relative; overflow: hidden;
}
.cat::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--a), var(--b));
  opacity: 0; transition: opacity .3s;
}
.cat:hover { color: #fff; border-color: var(--a); }
.cat:hover::after { opacity: 0.15; }
.cat.on {
  background: linear-gradient(135deg, var(--a), var(--b));
  border-color: transparent; color: #fff;
  box-shadow: var(--glow-a);
}
.cat.on::after { opacity: 0; }

/* ── MAIN ── */
main {
  position: relative; z-index: 2;
  padding-top: 140px; /* header 70 + cats 70 */
  min-height: 100vh;
}

/* ── HERO SECTION ── */
.hero {
  padding: 40px 28px 20px;
  position: relative;
}
.hero-headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 8vw, 96px);
  line-height: 0.95;
  letter-spacing: 2px;
  position: relative;
  display: inline-block;
}
.hero-headline .l1 {
  display: block;
  background: linear-gradient(90deg, #fff 0%, var(--b) 50%, #fff 100%);
  background-size: 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: heroShimmer 5s linear infinite;
}
.hero-headline .l2 {
  display: block;
  -webkit-text-stroke: 1px rgba(255,255,255,0.2);
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@keyframes heroShimmer { 0%{background-position:200%} 100%{background-position:-200%} }

.hero-sub {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: var(--muted); letter-spacing: 3px;
  margin-top: 12px; text-transform: uppercase;
  animation: fadeUp .8s .4s both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

/* ── VIDEO GRID ── */
.grid-section { padding: 0 28px 28px; }
.grid-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--muted); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.grid-title::after { content:''; flex:1; height:1px; background:var(--border); }

.vgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* ── VIDEO CARD ── */
.vcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden; cursor: pointer;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1), box-shadow .4s, border-color .4s;
  animation: cardReveal .5s cubic-bezier(.16,1,.3,1) both;
  position: relative;
}
.vcard::before {
  content: '';
  position: absolute; inset: 0; border-radius: var(--r);
  background: linear-gradient(135deg, var(--a)08, transparent 50%, var(--b)08);
  opacity: 0; transition: opacity .4s;
}
.vcard:hover { transform: translateY(-8px) scale(1.02); border-color: var(--a); box-shadow: var(--glow-a), 0 20px 60px rgba(0,0,0,0.5); }
.vcard:hover::before { opacity: 1; }

@keyframes cardReveal {
  from { opacity:0; transform:translateY(30px) scale(.96); }
  to   { opacity:1; transform:none; }
}

.vthumb {
  position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--bg3);
}
.vthumb img { width:100%;height:100%;object-fit:cover; transition:transform .5s ease; }
.vcard:hover .vthumb img { transform: scale(1.08); }

.thumb-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(124,58,237,.3), rgba(6,182,212,.2));
  opacity: 0; transition: opacity .4s;
  display: flex; align-items: center; justify-content: center;
}
.vcard:hover .thumb-overlay { opacity: 1; }

.play-ring {
  width: 54px; height: 54px; border-radius: 50%;
  border: 2px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
  transform: scale(0) rotate(-90deg);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.15);
}
.vcard:hover .play-ring { transform: scale(1) rotate(0deg); }

.vdur {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(0,0,0,.85); color: var(--b);
  font-family: 'Space Mono', monospace; font-size: 11px;
  padding: 3px 8px; border-radius: 5px;
  border: 1px solid rgba(6,182,212,0.3);
}

.vinfo { padding: 14px; display:flex;gap:10px; }
.vavi {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink:0;
  background: var(--bg3); border: 1px solid var(--border); overflow:hidden;
}
.vavi img { width:100%;height:100%;object-fit:cover; }
.vmeta { flex:1;overflow:hidden; }
.vtitle {
  font-size: 13px; font-weight: 700; line-height: 1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  color: var(--text); margin-bottom:5px; letter-spacing:.2px;
}
.vsub { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); line-height:1.6; }

/* Skeleton loader */
.skel { border-radius:4px; background:linear-gradient(90deg,var(--bg3) 25%,var(--card) 50%,var(--bg3) 75%); background-size:400%; animation:skelAnim 1.4s ease infinite; }
@keyframes skelAnim { 0%{background-position:200%} 100%{background-position:-200%} }

/* ── LOAD MORE ── */
.load-more {
  text-align: center; padding: 32px;
}
#loadMoreBtn {
  padding: 13px 40px; border-radius: 30px; cursor:pointer;
  border: 1px solid var(--a); background: transparent; color: var(--a);
  font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 2px;
  transition: all .3s; position:relative; overflow:hidden;
  display: none;
}
#loadMoreBtn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--a), var(--b));
  opacity: 0; transition: opacity .3s;
}
#loadMoreBtn:hover { color: #fff; border-color: transparent; box-shadow: var(--glow-a); }
#loadMoreBtn:hover::after { opacity: 1; }
#loadMoreBtn span { position: relative; z-index: 1; }

/* ── FULLSCREEN PLAYER ── */
#playerOverlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0);
  display: none; flex-direction: column;
  transition: background .4s;
}
#playerOverlay.open {
  display: flex;
  background: rgba(0,0,0,0.96);
  animation: playerIn .4s cubic-bezier(.16,1,.3,1);
}
@keyframes playerIn { from{opacity:0} to{opacity:1} }

.player-close {
  position: absolute; top: 20px; right: 20px; z-index: 10;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; font-size: 20px; cursor: pointer;
  display:flex;align-items:center;justify-content:center;
  transition: all .3s; backdrop-filter: blur(8px);
}
.player-close:hover { background: var(--c); border-color: var(--c); transform:rotate(90deg); }

.player-layout {
  display: flex; height: 100%;
  padding: 60px 28px 28px;
  gap: 24px; overflow: hidden;
}

/* ── VIDEO FRAME ── */
.player-main { flex: 1; display:flex;flex-direction:column;min-width:0; }

.frame-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 0 0 1px var(--border), var(--glow-a), 0 40px 100px rgba(0,0,0,0.8);
  background: #000;
  flex-shrink: 0;
  animation: frameGlow 4s ease-in-out infinite alternate;
}
@keyframes frameGlow {
  from { box-shadow: 0 0 0 1px rgba(124,58,237,.3), 0 0 60px rgba(124,58,237,.2), 0 40px 100px rgba(0,0,0,.8); }
  to   { box-shadow: 0 0 0 1px rgba(6,182,212,.3), 0 0 60px rgba(6,182,212,.2), 0 40px 100px rgba(0,0,0,.8); }
}
.frame-wrap::before {
  content: '';
  position: absolute; inset: -2px; border-radius: 18px; z-index: -1;
  background: linear-gradient(90deg, var(--a), var(--b), var(--c), var(--a));
  background-size: 300%;
  animation: borderSpin 4s linear infinite;
}
@keyframes borderSpin { 0%{background-position:0%} 100%{background-position:300%} }
#playerIframe { width:100%;height:100%;border:none;display:block; }

/* ── PROGRESS TRACK ── */
.progress-track {
  margin: 14px 0 6px; position:relative; height:4px;
  background: rgba(255,255,255,0.08); border-radius:2px; cursor:pointer;
  overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius:2px; width:0%;
  background: linear-gradient(90deg, var(--a), var(--b));
  transition: width 1s linear;
  position:relative;
}
.progress-fill::after {
  content:'';
  position:absolute;right:-4px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;background:#fff;
  box-shadow:0 0 10px var(--b);
  opacity:0; transition:opacity .2s;
}
.progress-track:hover .progress-fill::after { opacity:1; }

/* ── PLAYER META ── */
.player-title {
  font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
  margin: 8px 0 6px; line-height: 1.35; color: var(--text);
  letter-spacing: .3px;
}
.player-views {
  font-family:'Space Mono',monospace; font-size:12px; color:var(--muted);
  margin-bottom:12px;
}

/* ── ACTION BAR ── */
.action-bar { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px; }
.act {
  display:flex;align-items:center;gap:7px;
  padding:8px 16px; border-radius:20px; cursor:pointer;
  border:1px solid var(--border); background:var(--bg3);
  color:var(--muted); font-size:12px; font-weight:700;
  font-family:'Space Mono',monospace; letter-spacing:.5px;
  transition:all .3s; position:relative; overflow:hidden;
}
.act::after { content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--a),var(--b));opacity:0;transition:opacity .3s; }
.act:hover { border-color:var(--a);color:#fff; }
.act:hover::after { opacity:.15; }
.act.lit { border-color:var(--a);color:var(--a);box-shadow:var(--glow-a); }
.act i,.act span { position:relative;z-index:1; }

/* ── CHANNEL ROW ── */
.ch-row {
  display:flex;align-items:center;gap:12px;
  padding:14px 0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin-bottom:14px;
}
.ch-avi {
  width:48px;height:48px;border-radius:50%;
  border:2px solid var(--a);box-shadow:var(--glow-a);overflow:hidden;background:var(--bg3);
  animation:aviPulse 3s ease-in-out infinite;
}
@keyframes aviPulse { 0%,100%{box-shadow:var(--glow-a)} 50%{box-shadow:0 0 50px rgba(124,58,237,.7)} }
.ch-avi img { width:100%;height:100%;object-fit:cover; }
.ch-name { font-weight:800;font-size:15px;color:var(--text); }
.ch-subs { font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px; }
.sub-btn {
  margin-left:auto; padding:10px 22px; border-radius:22px; cursor:pointer;
  border:none; font-family:'Space Mono',monospace; font-size:12px; font-weight:700;
  letter-spacing:1px; transition:all .3s;
  background:linear-gradient(135deg,var(--a),var(--c));
  color:#fff; box-shadow:0 0 20px rgba(124,58,237,.3);
}
.sub-btn:hover { transform:scale(1.05);box-shadow:0 0 40px rgba(124,58,237,.5); }
.sub-btn.done { background:var(--bg3);border:1px solid var(--border);color:var(--muted);box-shadow:none; }

/* Description */
.desc {
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:14px;font-size:13px;line-height:1.7;color:var(--muted);
  cursor:pointer;max-height:80px;overflow:hidden;transition:max-height .4s ease;
  position:relative;
}
.desc::after { content:'more ▼';position:absolute;bottom:8px;right:12px;font-size:11px;color:var(--b);font-weight:700; }
.desc.exp { max-height:600px; }
.desc.exp::after { content:'less ▲'; }

/* ── COMMENTS ── */
.comments { margin-top:16px; }
.comments-ttl {
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;
  color:var(--b);text-transform:uppercase;margin-bottom:14px;
}
.cmt-input-row { display:flex;gap:10px;margin-bottom:18px; }
.cmt-field {
  flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;
  font-size:14px;padding:10px 14px;outline:none;resize:none;
  transition:border-color .3s;
}
.cmt-field:focus { border-color:var(--b);box-shadow:0 0 12px rgba(6,182,212,.15); }
.cmt-send {
  background:linear-gradient(135deg,var(--a),var(--b));
  border:none;border-radius:8px;color:#fff;padding:10px 16px;
  cursor:pointer;font-size:16px;transition:all .3s;
}
.cmt-send:hover { transform:scale(1.05);box-shadow:var(--glow-b); }
.cmt { display:flex;gap:10px;margin-bottom:16px;animation:cardReveal .3s both; }
.cmt-av { width:36px;height:36px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;overflow:hidden;background:var(--bg3); }
.cmt-av img { width:100%;height:100%;object-fit:cover; }
.cmt-author { font-size:12px;font-weight:800;color:var(--b);margin-bottom:3px; }
.cmt-date { font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-left:8px; }
.cmt-txt { font-size:13px;line-height:1.6;color:rgba(241,240,255,.7); }

/* ── RELATED SIDEBAR ── */
.player-sidebar {
  width: 360px; flex-shrink:0;
  overflow-y: auto; scrollbar-width:thin; scrollbar-color:var(--a) transparent;
  padding-right: 4px;
}
.player-sidebar::-webkit-scrollbar { width:3px; }
.player-sidebar::-webkit-scrollbar-thumb { background:var(--a);border-radius:2px; }
.sidebar-ttl {
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;
  color:var(--muted);text-transform:uppercase;margin-bottom:12px;
}
.rel-item {
  display:flex;gap:10px;cursor:pointer;padding:8px;border-radius:10px;
  border:1px solid transparent;transition:all .3s;margin-bottom:6px;
  background:var(--bg3);
}
.rel-item:hover { border-color:var(--border);background:var(--card);transform:translateX(4px); }
.rel-thumb {
  width:140px;height:79px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--bg);
  position:relative;
}
.rel-thumb img { width:100%;height:100%;object-fit:cover;transition:transform .3s; }
.rel-item:hover .rel-thumb img { transform:scale(1.05); }
.rel-dur {
  position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);
  color:var(--b);font-family:'Space Mono',monospace;font-size:10px;
  padding:2px 5px;border-radius:3px;
}
.rel-info { flex:1;overflow:hidden; }
.rel-title { font-size:12px;font-weight:700;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px; }
.rel-meta { font-family:'Space Mono',monospace;font-size:10px;color:var(--muted); }

/* ── TOAST ── */
.toast {
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:12px 24px;border-radius:10px;z-index:9999;
  font-size:13px;font-family:'Space Mono',monospace;letter-spacing:.5px;
  opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);
  box-shadow:var(--glow-a);backdrop-filter:blur(16px);
  white-space:nowrap;
}
.toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

/* ── WATERMARK ── */
.wm {
  position:fixed;bottom:18px;right:16px;z-index:9998;pointer-events:none;
  font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.12);
  letter-spacing:1px;text-align:right;line-height:1.6;
  animation:wmPulse 5s ease-in-out infinite;
}
@keyframes wmPulse { 0%,100%{opacity:.12} 50%{opacity:.25} }

/* ── FLOATING ORBS ── */
.orb {
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(100px);opacity:.2;
}
.orb1 { width:500px;height:500px;background:var(--a);top:-200px;right:-200px;animation:orbA 14s ease-in-out infinite; }
.orb2 { width:400px;height:400px;background:var(--b);bottom:-150px;left:-150px;animation:orbB 11s ease-in-out infinite; }
.orb3 { width:300px;height:300px;background:var(--c);top:40%;left:40%;animation:orbC 9s ease-in-out infinite;opacity:.12; }
@keyframes orbA { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-40px,30px)} 66%{transform:translate(30px,-40px)} }
@keyframes orbB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,-40px)} }
@keyframes orbC { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-60px,60px) scale(1.4)} }

/* ── EMPTY STATE ── */
.empty {
  text-align:center;padding:80px 20px;color:var(--muted);
  animation:fadeUp .5s both;
}
.empty i { font-size:56px;display:block;margin-bottom:16px;color:var(--a);opacity:.5; }
.empty p { font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px; }

/* ── RESPONSIVE ── */
@media (max-width:900px) {
  .player-sidebar { display:none; }
  .player-layout { padding:56px 14px 14px; }
  .vgrid { grid-template-columns:1fr 1fr; }
}
@media (max-width:600px) {
  .vgrid { grid-template-columns:1fr; }
  .hero-headline { font-size:clamp(36px,12vw,60px); }
  .search-wrap { max-width:200px; margin:0 12px; }
  .logo span { display:none; }
}
</style>
</head>

<script>
// ══════════════════════════════════════
//  NOVA STREAM — App Logic
//  Made in India 🇮🇳 By Sufiyan Absar
// ══════════════════════════════════════

const API_KEY = 'AIzaSyDTJfnHa3zmUUu__wc2VEL5oRzIgij6kcQ';
const BASE = 'https://www.googleapis.com/youtube/v3';

// ── UTILS ──
const $ = id => document.getElementById(id);
const api = async (ep, p) => {
  p.key = API_KEY;
  const r = await fetch(`${BASE}/${ep}?${new URLSearchParams(p)}`);
  return r.json();
};
const fmtV = n => { n=+n||0; return n>=1e9?(n/1e9).toFixed(1)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n+''; };
const fmtD = s => { if(!s)return''; const m=s.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/)||[]; const h=+m[1]||0,mi=+m[2]||0,se=+m[3]||0; return h?`${h}:${String(mi).padStart(2,'0')}:${String(se).padStart(2,'0')}`:`${mi}:${String(se).padStart(2,'0')}`; };
const ago = d => { const s=(Date.now()-new Date(d))/1e3; return s<60?'just now':s<3600?Math.floor(s/60)+'m ago':s<86400?Math.floor(s/3600)+'h ago':s<2592e3?Math.floor(s/86400)+'d ago':s<31536e3?Math.floor(s/2592e3)+'mo ago':Math.floor(s/31536e3)+'y ago'; };
const showToast = msg => { const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); };

// ── CURSOR ──
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;$('cur').style.left=mx+'px';$('cur').style.top=my+'px';});
(function curLoop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;$('cur-ring').style.left=rx+'px';$('cur-ring').style.top=ry+'px';requestAnimationFrame(curLoop);})();

// ── BG CANVAS (Aurora particles) ──
(function(){
  const cv=$('bgCanvas'), cx=cv.getContext('2d');
  const resize=()=>{cv.width=innerWidth;cv.height=innerHeight;};
  resize(); addEventListener('resize',resize);
  const colors=['#7c3aed','#06b6d4','#f43f5e','#10b981'];
  const pts=Array.from({length:100},()=>({
    x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
    r:Math.random()*1.8+.4,
    c:colors[Math.floor(Math.random()*4)],
    a:Math.random()*.6+.2
  }));
  function draw(){
    cx.fillStyle='rgba(5,5,7,0.12)';cx.fillRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=cv.width; if(p.x>cv.width)p.x=0;
      if(p.y<0)p.y=cv.height; if(p.y>cv.height)p.y=0;
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle=p.c;cx.globalAlpha=p.a;cx.fill();
      pts.forEach(q=>{
        const d=Math.hypot(p.x-q.x,p.y-q.y);
        if(d<110){
          cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);
          cx.strokeStyle=p.c;cx.globalAlpha=(1-d/110)*.06;cx.lineWidth=.8;cx.stroke();
        }
      });
    });
    cx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── CATEGORIES ──
const CATS = [
  {label:'🔥 Trending', q:'trending india', type:'chart'},
  {label:'🎵 Music', q:'music india 2024'},
  {label:'🎮 Gaming', q:'gaming'},
  {label:'📰 News', q:'india news today'},
  {label:'⚽ Sports', q:'sports cricket ipl'},
  {label:'😂 Comedy', q:'comedy funny india'},
  {label:'🔬 Tech', q:'technology ai 2024'},
  {label:'🎬 Movies', q:'bollywood trailer 2024'},
  {label:'🍳 Food', q:'indian food recipes'},
  {label:'🌍 Travel', q:'travel india vlog'},
  {label:'💪 Fitness', q:'workout fitness india'},
  {label:'📚 Study', q:'education study india'},
];

let curCat = 0, nextToken='', loading=false;

function buildCats(){
  const c=$('cats');
  CATS.forEach((cat,i)=>{
    const b=document.createElement('button');
    b.className='cat'+(i===0?' on':'');
    b.textContent=cat.label;
    b.onclick=()=>switchCat(i,b);
    c.appendChild(b);
  });
}

function switchCat(i,btn){
  curCat=i; nextToken='';
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  $('gridLabel').textContent=CATS[i].label.replace(/./u,'').trim()+' VIDEOS';
  $('heroSection').style.display=(i===0)?'block':'none';
  loadVideos();
}

// ── LOAD VIDEOS ──
async function loadVideos(append=false){
  if(loading)return; loading=true;
  if(!append){
    $('vgrid').innerHTML=skelHTML(8);
    $('loadMoreBtn').style.display='none';
  }

  try {
    const cat=CATS[curCat];
    let items=[], token='';

    if(cat.type==='chart'){
      // Trending
      const p={part:'snippet,statistics,contentDetails',chart:'mostPopular',maxResults:24,regionCode:'IN'};
      if(nextToken) p.pageToken=nextToken;
      const d=await api('videos',p);
      items=d.items||[]; token=d.nextPageToken||'';
    } else {
      // Search
      const sp={part:'snippet',q:cat.q,type:'video',maxResults:24,regionCode:'IN',order:'relevance'};
      if(nextToken) sp.pageToken=nextToken;
      const sd=await api('search',sp);
      token=sd.nextPageToken||'';
      const ids=(sd.items||[]).map(i=>i.id?.videoId).filter(Boolean).join(',');
      if(ids){
        const vd=await api('videos',{part:'snippet,statistics,contentDetails',id:ids});
        items=vd.items||[];
      }
    }

    nextToken=token;
    $('loadMoreBtn').style.display=token?'block':'none';

    const grid=$('vgrid');
    if(!append) grid.innerHTML='';

    if(!items.length && !append){
      grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><i>🛸</i><p>NO VIDEOS FOUND</p></div>`;
    } else {
      renderCards(items, grid, append ? grid.children.length : 0);
    }
  } catch(e){
    $('vgrid').innerHTML=`<div class="empty" style="grid-column:1/-1"><i>⚡</i><p>ERROR LOADING VIDEOS</p></div>`;
    console.error(e);
  }
  loading=false;
}

function loadMore(){ if(nextToken) loadVideos(true); }

// ── SEARCH ──
async function doSearch(){
  const q=$('searchInput').value.trim();
  if(!q)return;
  nextToken=''; loading=false;
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
  $('gridLabel').textContent=`RESULTS FOR "${q.toUpperCase()}"`;
  $('heroSection').style.display='none';
  $('vgrid').innerHTML=skelHTML(8);
  $('loadMoreBtn').style.display='none';

  try {
    const p={part:'snippet',q,type:'video',maxResults:24,regionCode:'IN',order:'relevance'};
    const sd=await api('search',p);
    nextToken=sd.nextPageToken||'';
    const ids=(sd.items||[]).map(i=>i.id?.videoId).filter(Boolean).join(',');
    let items=[];
    if(ids){
      const vd=await api('videos',{part:'snippet,statistics,contentDetails',id:ids});
      items=vd.items||[];
    }
    $('vgrid').innerHTML='';
    if(!items.length){ $('vgrid').innerHTML=`<div class="empty" style="grid-column:1/-1"><i>🔭</i><p>NOTHING FOUND FOR "${q.toUpperCase()}"</p></div>`; }
    else renderCards(items,$('vgrid'),0);
    $('loadMoreBtn').style.display=nextToken?'block':'none';
  } catch(e){ $('vgrid').innerHTML=`<div class="empty" style="grid-column:1/-1"><i>⚡</i><p>SEARCH FAILED</p></div>`; }
}

$('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });

// ── RENDER CARDS ──
function renderCards(items, grid, startIdx){
  items.forEach((item,i)=>{
    const id = item.id?.videoId || item.id;
    const s  = item.snippet||{};
    const st = item.statistics||{};
    const cd = item.contentDetails||{};
    const dur = fmtD(cd.duration);
    const thumb = s.thumbnails?.medium?.url||s.thumbnails?.default?.url||'';
    const chImg = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.channelTitle||'?')}&background=10101a&color=7c3aed&size=34&bold=true`;

    const card = document.createElement('div');
    card.className='vcard';
    card.style.animationDelay=((i)*0.06)+'s';
    card.onclick=()=>openPlayer(id);
    card.innerHTML=`
      <div class="vthumb">
        <img src="${thumb}" alt="${s.title||''}" loading="lazy" onerror="this.src='https://placehold.co/320x180/0a0a10/7c3aed?text=NOVA'">
        <div class="thumb-overlay"><div class="play-ring">▶</div></div>
        ${dur?`<span class="vdur">${dur}</span>`:''}
      </div>
      <div class="vinfo">
        <div class="vavi"><img src="${chImg}" alt="${s.channelTitle||''}"></div>
        <div class="vmeta">
          <p class="vtitle">${s.title||'Untitled'}</p>
          <p class="vsub">${s.channelTitle||''}${st.viewCount?` · ${fmtV(st.viewCount)} views`:''}${s.publishedAt?` · ${ago(s.publishedAt)}`:''}</p>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function skelHTML(n){
  return Array.from({length:n},()=>`
    <div class="vcard" style="pointer-events:none">
      <div class="skel" style="aspect-ratio:16/9"></div>
      <div class="vinfo">
        <div class="skel" style="width:34px;height:34px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:6px;padding:2px 0">
          <div class="skel" style="height:13px;border-radius:4px;width:90%"></div>
          <div class="skel" style="height:13px;border-radius:4px;width:70%"></div>
          <div class="skel" style="height:10px;border-radius:4px;width:50%;margin-top:4px"></div>
        </div>
      </div>
    </div>`).join('');
}

// ── PLAYER ──
let liked=false, subbed=false, curVid='';

async function openPlayer(id){
  curVid=id;
  const ol=$('playerOverlay');
  ol.classList.add('open');
  document.body.style.overflow='hidden';

  $('playerIframe').src=`https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;
  $('playerTitle').textContent='Loading…';
  $('playerViews').textContent='';
  $('chName').textContent='—';
  $('chSubs').textContent='—';
  $('descBox').textContent='…';
  $('cmtList').innerHTML='';
  $('relList').innerHTML='';
  $('progressFill').style.width='0%';

  // Reset like/sub
  liked=false; subbed=false;
  $('likeBtn').classList.remove('lit');
  $('subBtn').classList.remove('done');
  $('subBtn').textContent='SUBSCRIBE';

  try {
    const [vData, relData] = await Promise.all([
      api('videos',{part:'snippet,statistics,contentDetails',id}),
      api('search',{part:'snippet',relatedToVideoId:id,type:'video',maxResults:15})
    ]);

    const v=vData.items?.[0]; if(!v)return;
    const s=v.snippet, st=v.statistics, cd=v.contentDetails;

    document.title=s.title+' · NOVA STREAM';
    $('playerTitle').textContent=s.title;
    $('playerViews').textContent=`${fmtV(st.viewCount)} views · ${ago(s.publishedAt)}`;
    $('likeCount').textContent=fmtV(st.likeCount);
    $('cmtCount').textContent=fmtV(st.commentCount);
    $('descBox').textContent=s.description||'No description.';
    $('chName').textContent=s.channelTitle;
    $('chAvatar').src=`https://ui-avatars.com/api/?name=${encodeURIComponent(s.channelTitle)}&background=10101a&color=7c3aed&size=48&bold=true`;

    // Animate progress bar for duration
    const durSec=(()=>{ const m=(cd.duration||'').match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/)||[]; return (+m[1]||0)*3600+(+m[2]||0)*60+(+m[3]||0); })();
    if(durSec){ $('progressFill').style.transition=`width ${durSec}s linear`; setTimeout(()=>$('progressFill').style.width='100%',200); }

    // Channel subs
    api('channels',{part:'statistics',id:s.channelId}).then(d=>{
      const ch=d.items?.[0]; if(ch) $('chSubs').textContent=fmtV(ch.statistics.subscriberCount)+' subscribers';
    });

    // Related
    renderRelated(relData.items||[]);

    // Comments
    api('commentThreads',{part:'snippet',videoId:id,maxResults:20,order:'relevance'}).then(d=>{
      renderComments(d.items||[]);
    });

  } catch(e){ console.error(e); }
}

function renderRelated(items){
  const list=$('relList'); list.innerHTML='';
  items.forEach(item=>{
    const id=item.id?.videoId; if(!id)return;
    const s=item.snippet||{};
    const thumb=s.thumbnails?.medium?.url||'';
    const div=document.createElement('div');
    div.className='rel-item';
    div.onclick=()=>openPlayer(id);
    div.innerHTML=`
      <div class="rel-thumb">
        <img src="${thumb}" alt="${s.title||''}" loading="lazy" onerror="this.src='https://placehold.co/140x79/0a0a10/7c3aed?text=NOVA'">
      </div>
      <div class="rel-info">
        <p class="rel-title">${s.title||''}</p>
        <p class="rel-meta">${s.channelTitle||''}<br>${ago(s.publishedAt)}</p>
      </div>`;
    list.appendChild(div);
  });
}

function renderComments(items){
  const list=$('cmtList'); list.innerHTML='';
  items.forEach((item,i)=>{
    const c=item.snippet?.topLevelComment?.snippet||{};
    const div=document.createElement('div');
    div.className='cmt'; div.style.animationDelay=(i*.04)+'s';
    div.innerHTML=`
      <div class="cmt-av"><img src="${c.authorProfileImageUrl||`https://ui-avatars.com/api/?name=U&size=36&background=10101a&color=7c3aed`}" alt=""></div>
      <div>
        <div><span class="cmt-author">${c.authorDisplayName||'User'}</span><span class="cmt-date">${ago(c.publishedAt)}</span></div>
        <p class="cmt-txt">${c.textDisplay||''}</p>
      </div>`;
    list.appendChild(div);
  });
}

function closePlayer(){
  $('playerOverlay').classList.remove('open');
  $('playerIframe').src='';
  document.body.style.overflow='';
  document.title='NOVA STREAM';
}

// Player actions
function toggleLike(){
  liked=!liked;
  $('likeBtn').classList.toggle('lit',liked);
  showToast(liked?'👍 Liked!':'Removed like');
}
function doShare(){
  navigator.clipboard?.writeText(`https://view-tube-x.vercel.app/player.html?v=${curVid}`).then(()=>showToast('🔗 Link copied!'));
}
function doSave(){ showToast('🔖 Saved to Watch Later'); }
function doDownload(){ showToast('⬇ Use a downloader extension'); }
function toggleSub(btn){
  subbed=!subbed;
  btn.textContent=subbed?'✓ SUBSCRIBED':'SUBSCRIBE';
  btn.classList.toggle('done',subbed);
  showToast(subbed?'🔔 Subscribed!':'Unsubscribed');
}
function postCmt(){
  const f=$('cmtField'); const txt=f.value.trim(); if(!txt)return;
  const div=document.createElement('div');
  div.className='cmt';
  div.innerHTML=`
    <div class="cmt-av"><img src="https://ui-avatars.com/api/?name=You&size=36&background=7c3aed&color=fff" alt=""></div>
    <div>
      <div><span class="cmt-author" style="color:var(--c)">You</span><span class="cmt-date">just now</span></div>
      <p class="cmt-txt">${txt}</p>
    </div>`;
  $('cmtList').insertBefore(div,$('cmtList').firstChild);
  f.value=''; showToast('💬 Posted!');
}

// ── TRENDING SHORTCUT ──
function loadTrending(btn){
  curCat=0; nextToken='';
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.cat')[0]?.classList.add('on');
  $('gridLabel').textContent='TRENDING NOW';
  $('heroSection').style.display='block';
  $('searchInput').value='';
  loadVideos();
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closePlayer();
  if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){ e.preventDefault(); $('searchInput').focus(); }
});

// ── SCROLL SEARCH ──
let lastY=0;
window.addEventListener('scroll',()=>{ const y=scrollY; if(y>200&&y>lastY) document.querySelector('header').style.transform='translateY(-100%'; else document.querySelector('header').style.transform=''; lastY=y; },{passive:true});

// ── INIT ──
buildCats();
loadVideos();
</script>
</body>
</html>
