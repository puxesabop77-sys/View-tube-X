<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - View-Tube-X</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="no-sidebar">
<div class="watermark">Made in India 🇮🇳 By Sufiyan Absar</div>

<header class="header" style="justify-content:flex-end">
  <a href="index.html" class="logo" style="position:absolute;left:50%;transform:translateX(-50%)">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="ViewTubeX" style="height:24px;filter:hue-rotate(180deg);">
    <span style="font-size:16px;font-weight:700;color:#ff0000;margin-left:4px;">X</span>
  </a>
</header>

<div class="login-page" style="margin-top:56px">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="ViewTubeX" style="height:28px;filter:hue-rotate(180deg);">
      <span style="font-size:16px;font-weight:700;color:#ff0000;">X</span>
    </div>
    <h2 class="login-title">Sign in</h2>
    <p class="login-subtitle">to continue to View-Tube-X</p>
    
    <div id="loginForm">
      <input type="email" class="login-input" id="emailInput" placeholder="Email or username" required>
      <input type="password" class="login-input" id="passInput" placeholder="Password" required>
      
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px">
          <input type="checkbox" style="width:16px;height:16px"> Remember me
        </label>
        <a href="#" style="color:#1a73e8;text-decoration:none;font-size:14px">Forgot password?</a>
      </div>
      
      <button class="login-btn" onclick="handleLogin()">Sign in</button>
      
      <div class="login-divider">or</div>
      
      <button class="google-btn" onclick="handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="login-footer">
      Don't have an account? <a href="#" onclick="showSignup()">Create account</a>
    </div>
    
    <div style="text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
      <p style="font-size:12px;color:#555">Made in India 🇮🇳 By Sufiyan Absar</p>
    </div>
  </div>
</div>

<footer class="footer" style="margin-left:0">
  <div class="footer-links">
    <a href="#">Help</a><a href="#">Privacy</a><a href="#">Terms</a>
  </div>
  <p class="footer-copy">© 2014 Sufiyan Absar. All Rights Reserved.</p>
  <p class="footer-made">Made in India 🇮🇳 By Sufiyan Absar</p>
</footer>

<script src="config.js"></script>
<script src="script.js"></script>
<script>
function handleLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value.trim();
  
  if (!email || !pass) {
    showNotification('⚠️ Please fill in all fields');
    return;
  }
  
  // Simulate login
  showNotification('✅ Signing in...');
  setTimeout(() => window.location.href = 'index.html', 1500);
}

function handleGoogleLogin() {
  showNotification('🔐 Redirecting to Google sign-in...');
  setTimeout(() => window.location.href = 'index.html', 1500);
}

function showSignup() {
  const form = document.getElementById('loginForm');
  form.innerHTML = `
    <input type="text" class="login-input" id="nameInput" placeholder="Full name">
    <input type="email" class="login-input" id="emailInput" placeholder="Email">
    <input type="password" class="login-input" id="passInput" placeholder="Password">
    <input type="password" class="login-input" placeholder="Confirm password">
    <button class="login-btn" onclick="handleSignup()">Create Account</button>
    <p style="text-align:center;margin-top:16px;font-size:14px">Already have an account? <a href="login.html" style="color:#1a73e8;text-decoration:none">Sign in</a></p>
  `;
  document.querySelector('.login-title').textContent = 'Create account';
  document.querySelector('.login-subtitle').textContent = 'to join View-Tube-X';
}

function handleSignup() {
  showNotification('✅ Account created! Welcome to View-Tube-X!');
  setTimeout(() => window.location.href = 'index.html', 1500);
}
</script>
</body>
</html>
