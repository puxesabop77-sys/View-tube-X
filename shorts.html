<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts - View-Tube-X</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.shorts-feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  position: relative;
}
.shorts-feed::-webkit-scrollbar { display: none; }

.short-item {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  background: #000;
}

.short-player-container {
  position: relative;
  max-width: 380px;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
}

.short-iframe-wrapper {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #000;
}
.short-iframe-wrapper iframe {
  width: 100%; height: 100%; border: none;
}

.short-overlay-info {
  position: relative;
  z-index: 10;
  padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}
.short-overlay-title {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 8px;
}
.short-overlay-channel {
  display: flex;
  align-items: center;
  gap: 8px;
}
.short-channel-pic {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff;
}
.short-subscribe-mini {
  background: none;
  border: 1px solid #fff;
  color: #fff;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Roboto', sans-serif;
}

.short-side-actions {
  position: absolute;
  right: 12px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 10;
}
.short-action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.short-action-btn i { font-size: 28px; }
.short-action-btn span { font-size: 12px; }

/* Nav overlay */
.shorts-nav {
  position: fixed;
  bottom: 50%;
  right: 20px;
  transform: translateY(50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1000;
}
.shorts-nav button {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  backdrop-filter: blur(4px);
}
.shorts-nav button:hover { background: rgba(255,255,255,0.3); }

/* Header override for full black */
.header { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
</style>
</head>
<body>
<div class="watermark">Made in India 🇮🇳 By Sufiyan Absar</div>

<header class="header">
  <div class="header-left">
    <button class="menu-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
    <a href="index.html" class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="ViewTubeX" style="height:20px;filter:hue-rotate(180deg);">
      <span style="font-size:14px;font-weight:700;color:#ff0000;margin-left:4px;">X</span>
    </a>
    <span style="font-size:20px;font-weight:700">Shorts</span>
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="window.location.href='index.html'"><i class="fas fa-home"></i></button>
    <a href="login.html"><img src="https://ui-avatars.com/api/?name=User&background=ff0000&color=fff&size=32" class="avatar" alt="Account"></a>
  </div>
</header>

<div class="shorts-feed" id="shortsFeed" style="margin-top:56px">
  <div style="text-align:center;padding:60px;color:#aaa">
    <i class="fas fa-spinner fa-spin" style="font-size:32px"></i>
    <p style="margin-top:16px">Loading Shorts...</p>
  </div>
</div>

<footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:8px;background:rgba(0,0,0,0.7);z-index:100">
  <p style="color:rgba(255,255,255,0.4);font-size:11px">© 2014 Sufiyan Absar. All Rights Reserved. | Made in India 🇮🇳 By Sufiyan Absar</p>
</footer>

<script src="config.js"></script>
<script src="script.js"></script>
<script>
async function loadShorts() {
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=shorts&type=video&videoDuration=short&maxResults=20&regionCode=IN&key=${API_KEY}`);
    const data = await res.json();
    const feed = document.getElementById('shortsFeed');
    feed.innerHTML = '';
    
    data.items.forEach((item, i) => {
      const id = item.id.videoId;
      const s = item.snippet;
      const chAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.channelTitle)}&background=random&size=32`;
      
      const div = document.createElement('div');
      div.className = 'short-item';
      div.innerHTML = `
        <div class="short-player-container">
          <div class="short-iframe-wrapper">
            ${i === 0 ? `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&controls=1&rel=0" allow="autoplay; fullscreen"></iframe>` : `<div class="short-placeholder" data-id="${id}" style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="loadShortIframe(this, '${id}')"><img src="${s.thumbnails?.high?.url || ''}" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;font-size:64px;opacity:0.8">▶</div></div>`}
          </div>
          
          <div class="short-side-actions">
            <button class="short-action-btn" onclick="this.querySelector('i').className='fas fa-heart';this.querySelector('span').textContent=parseInt(this.querySelector('span').textContent)+1">
              <i class="far fa-heart"></i>
              <span>Like</span>
            </button>
            <button class="short-action-btn">
              <i class="fas fa-comment"></i>
              <span>Comment</span>
            </button>
            <button class="short-action-btn" onclick="navigator.clipboard.writeText('https://view-tube-x.vercel.app/player.html?v=${id}');showNotification('🔗 Copied!')">
              <i class="fas fa-share"></i>
              <span>Share</span>
            </button>
            <button class="short-action-btn" onclick="window.location.href='player.html?v=${id}'">
              <i class="fas fa-expand"></i>
              <span>Watch</span>
            </button>
          </div>
          
          <div class="short-overlay-info">
            <p class="short-overlay-title">${s.title}</p>
            <div class="short-overlay-channel">
              <img src="${chAvatar}" class="short-channel-pic" alt="${s.channelTitle}">
              <span style="font-size:13px;font-weight:500">${s.channelTitle}</span>
              <button class="short-subscribe-mini" onclick="this.textContent=this.textContent==='Subscribe'?'Subscribed ✓':'Subscribe'">Subscribe</button>
            </div>
          </div>
        </div>
      `;
      feed.appendChild(div);
    });
    
    // Intersection observer to autoplay iframes
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const placeholder = e.target.querySelector('.short-placeholder');
          if (placeholder) {
            const id = placeholder.dataset.id;
            loadShortIframe(placeholder, id);
          }
        }
      });
    }, { threshold: 0.8 });
    
    document.querySelectorAll('.short-item').forEach(el => observer.observe(el));
    
  } catch(err) {
    document.getElementById('shortsFeed').innerHTML = '<p style="color:#aaa;text-align:center;padding:60px">Could not load Shorts. Please check your connection.</p>';
  }
}

function loadShortIframe(el, id) {
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&controls=1&rel=0`;
  iframe.allow = 'autoplay; fullscreen';
  iframe.style.cssText = 'width:100%;height:100%;border:none;';
  el.parentNode.replaceChild(iframe, el);
}

loadShorts();
</script>
</body>
</html>
