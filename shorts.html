<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts · View-Tube-X</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { box-sizing: border-box; }
body { overflow: hidden; background: #000; }
.header { background: rgba(3,5,8,0.75) !important; backdrop-filter: blur(16px) !important; }

.shorts-wrapper {
  display: flex;
  height: calc(100vh - var(--header-h));
  margin-top: var(--header-h);
}

.shorts-feed {
  flex: 1;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.shorts-feed::-webkit-scrollbar { display: none; }

.short-slide {
  height: calc(100vh - var(--header-h));
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  overflow: hidden;
}

.short-bg-glow {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
}

.short-inner {
  position: relative;
  width: min(400px, 100vw);
  height: 100%;
  z-index: 2;
  overflow: hidden;
  background: #000;
}

.short-iframe-wrap {
  position: absolute; inset: 0;
  background: #000;
}
.short-iframe-wrap iframe {
  width: 100%; height: 100%; border: none; display: block;
}

.short-thumb-layer {
  position: absolute; inset: 0; z-index: 3;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden;
  transition: opacity 0.5s;
}
.short-thumb-layer img {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(0.55);
}
.short-thumb-layer.hidden { opacity: 0; pointer-events: none; }

/* TAP TO START overlay */
.tap-overlay {
  position: fixed; inset: 0; z-index: 9990;
  background: rgba(0,0,0,0.82);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; cursor: pointer;
  backdrop-filter: blur(8px);
  transition: opacity 0.4s;
}
.tap-overlay.gone { opacity: 0; pointer-events: none; }
.tap-icon {
  width: 96px; height: 96px; border-radius: 50%;
  background: rgba(0,245,255,0.1); border: 2px solid var(--neon);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px; color: var(--neon);
  box-shadow: 0 0 40px rgba(0,245,255,0.4);
  animation: tapPulse 1.6s ease-in-out infinite;
}
@keyframes tapPulse {
  0%,100% { transform: scale(1);    box-shadow: 0 0 30px rgba(0,245,255,0.3); }
  50%      { transform: scale(1.1); box-shadow: 0 0 70px rgba(0,245,255,0.6); }
}
.tap-label {
  font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700;
  color: var(--text); letter-spacing: 4px;
}
.tap-sub { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text2); letter-spacing: 2px; }

/* Play/pause flash */
.pp-flash {
  position: absolute; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
}
.pp-flash-icon {
  width: 70px; height: 70px; border-radius: 50%;
  background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #fff;
}
.pp-flash.show { animation: ppAnim 0.55s ease forwards; }
@keyframes ppAnim {
  0%   { opacity:0; transform:scale(0.5); }
  30%  { opacity:1; transform:scale(1); }
  70%  { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(1.3); }
}

/* Mute badge */
.mute-badge {
  position: absolute; top: 68px; right: 12px; z-index: 15;
  background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px; padding: 6px 14px; color: #fff;
  font-size: 12px; font-family: 'Exo 2', sans-serif; font-weight: 700;
  display: flex; align-items: center; gap: 7px; cursor: pointer;
  backdrop-filter: blur(8px); transition: all 0.3s;
  animation: slideDown 0.3s ease;
}
.mute-badge:hover { border-color: var(--neon); color: var(--neon); }
.mute-badge.hidden { display: none; }
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } }

.short-overlay {
  position: absolute; inset: 0; pointer-events: none; z-index: 5;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.25) 0%,
    transparent 20%,
    transparent 55%,
    rgba(0,0,0,0.75) 80%,
    rgba(0,0,0,0.95) 100%
  );
}

.short-bottom-info {
  position: absolute; bottom: 0; left: 0; right: 60px;
  padding: 14px 14px 26px; z-index: 10; pointer-events: all;
}
.short-title-txt {
  font-size: 14px; font-weight: 600; line-height: 1.5;
  margin-bottom: 10px; color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.short-ch-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.short-ch-avi {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid var(--neon); object-fit: cover; flex-shrink: 0;
}
.short-ch-name { font-size: 13px; font-weight: 700; color: #fff; }
.short-sub-mini {
  padding: 4px 14px; border-radius: 14px; border: 1px solid #fff;
  background: rgba(255,255,255,0.12); color: #fff;
  font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: 'Exo 2', sans-serif; transition: all 0.3s;
  backdrop-filter: blur(4px);
}
.short-sub-mini:hover { background: rgba(255,255,255,0.3); }
.short-sub-mini.subbed { background: var(--neon); border-color: var(--neon); color: #000; }

/* Progress bar */
.short-prog-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px; z-index: 15;
  background: rgba(255,255,255,0.15);
}
.short-prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--neon), var(--neon3));
}

/* Side actions */
.short-actions {
  position: absolute; right: 10px; bottom: 88px; z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.short-act-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  background: none; border: none; color: #fff; cursor: pointer;
  font-family: 'Exo 2', sans-serif; transition: transform 0.25s;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.9));
}
.short-act-btn:hover { transform: scale(1.25); }
.short-act-btn i { font-size: 26px; }
.short-act-btn span { font-size: 11px; font-weight: 700; }
.short-act-btn.liked i { color: #ff4d6d; filter: drop-shadow(0 0 8px #ff4d6d); }

/* Right panel */
.shorts-right-panel {
  width: 66px; background: rgba(3,5,8,0.88);
  backdrop-filter: blur(16px); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; padding: 16px 0; flex-shrink: 0;
}
.panel-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--glass);
  color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.panel-btn:hover { border-color: var(--neon); color: var(--neon); box-shadow: var(--glow); transform: scale(1.1); }
.panel-btn.muted { border-color: var(--neon2); color: var(--neon2); }

/* Scroll dots */
.scroll-dots {
  position: fixed; right: 78px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 5px; z-index: 200;
  pointer-events: none;
}
.sdot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.2); transition: all 0.35s;
}
.sdot.active {
  height: 18px; border-radius: 3px;
  background: var(--neon); box-shadow: 0 0 10px var(--neon);
}
</style>
</head>
<body>
<header class="header" id="vtx-header"></header>

<!-- ONE-TIME TAP TO UNLOCK AUTOPLAY -->
<div class="tap-overlay" id="tapOverlay" onclick="unlockAndPlay()">
  <div class="tap-icon"><i class="fas fa-play"></i></div>
  <p class="tap-label">TAP TO START</p>
  <p class="tap-sub">ENABLE AUTOPLAY</p>
</div>

<div class="shorts-wrapper">
  <div class="shorts-feed" id="shortsFeed">
    <div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px">
      <div class="loader-3d" style="width:56px;height:56px"></div>
      <span class="loading-text">LOADING SHORTS</span>
    </div>
  </div>

  <div class="shorts-right-panel">
    <button class="panel-btn" onclick="navigateShort(-1)"><i class="fas fa-chevron-up"></i></button>
    <button class="panel-btn" onclick="navigateShort(1)"><i class="fas fa-chevron-down"></i></button>
    <button class="panel-btn" id="muteBtn" onclick="toggleMute()"><i class="fas fa-volume-up"></i></button>
    <button class="panel-btn" id="pauseBtn" onclick="togglePause()"><i class="fas fa-pause" id="pauseIcon"></i></button>
    <button class="panel-btn" onclick="VTX.goto('index.html')"><i class="fas fa-home"></i></button>
  </div>
</div>

<div class="scroll-dots" id="scrollDots"></div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
vtxInit({ active: 'shorts' });

let shorts = [];
let currentIdx = 0;
let unlocked = false;   // has user tapped "tap to start"?
let muted = false;
let paused = false;

// ─── STEP 1: User taps → unlock browser autoplay ───
function unlockAndPlay() {
  unlocked = true;
  const overlay = document.getElementById('tapOverlay');
  overlay.classList.add('gone');
  // Play slide 0 immediately
  playSlide(0);
}

// ─── LOAD API ───
async function loadShorts() {
  try {
    const data = await VTX.fetch('search', {
      part: 'snippet',
      q: '#shorts india',
      type: 'video',
      videoDuration: 'short',
      maxResults: 20,
      regionCode: 'IN',
      order: 'relevance'
    });
    shorts = (data.items || []).filter(i => i.id?.videoId);
    if (!shorts.length) throw new Error('empty');
    renderSlides();
  } catch(e) {
    document.getElementById('shortsFeed').innerHTML =
      `<div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text2)">
        <i class="fas fa-satellite-dish" style="font-size:48px;color:var(--neon3)"></i>
        <p style="font-family:'Share Tech Mono',monospace;letter-spacing:1px">Could not load Shorts</p>
       </div>`;
  }
}

// ─── RENDER ALL SLIDES ───
function renderSlides() {
  const feed = document.getElementById('shortsFeed');
  const dots = document.getElementById('scrollDots');
  feed.innerHTML = '';
  dots.innerHTML = '';
  const pal = ['7b2fff','ff006e','00f5ff','00c853','ff6d00'];

  shorts.forEach((item, i) => {
    const id    = item.id.videoId;
    const s     = item.snippet;
    const thumb = s.thumbnails?.maxres?.url || s.thumbnails?.high?.url || s.thumbnails?.medium?.url || '';
    const chAvi = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.channelTitle||'CH')}&background=${pal[i%5]}&color=fff&size=32`;
    const c1 = '#'+pal[i%5], c2 = '#'+pal[(i+2)%5];

    const slide = document.createElement('div');
    slide.className = 'short-slide';
    slide.dataset.idx = i;
    slide.dataset.vid = id;

    slide.innerHTML = `
      <div class="short-bg-glow" style="background:radial-gradient(circle at 25% 50%,${c1}28,transparent 55%),radial-gradient(circle at 75% 50%,${c2}18,transparent 55%)"></div>
      <div class="short-inner">

        <div class="short-iframe-wrap" id="iw-${i}"></div>

        <div class="short-thumb-layer" id="tl-${i}" onclick="onThumbTap(${i})">
          <img src="${thumb}" alt="${s.title}" onerror="this.src='https://placehold.co/400x700/0d1520/00f5ff?text=VTX'">
          <div class="short-play-btn"><i class="fas fa-play"></i></div>
        </div>

        <div class="pp-flash" id="ppf-${i}">
          <div class="pp-flash-icon" id="ppi-${i}"><i class="fas fa-pause"></i></div>
        </div>

        <div class="mute-badge hidden" id="mb-${i}" onclick="toggleMute()">
          <i class="fas fa-volume-mute"></i> TAP TO UNMUTE
        </div>

        <div class="short-overlay"></div>

        <div class="short-actions">
          <button class="short-act-btn" id="lbtn-${i}" onclick="likeShort(${i},event)">
            <i class="far fa-heart"></i><span>Like</span>
          </button>
          <button class="short-act-btn" onclick="shareShort('${id}',event)">
            <i class="fas fa-share-alt"></i><span>Share</span>
          </button>
          <button class="short-act-btn" onclick="VTX.goto('player.html?v=${id}')">
            <i class="fas fa-expand-alt"></i><span>Watch</span>
          </button>
        </div>

        <div class="short-bottom-info">
          <p class="short-title-txt">${s.title}</p>
          <div class="short-ch-row">
            <img src="${chAvi}" class="short-ch-avi" alt="">
            <span class="short-ch-name">${s.channelTitle}</span>
            <button class="short-sub-mini" id="sb-${i}" onclick="subShort(${i},event)">Subscribe</button>
          </div>
        </div>

        <div class="short-prog-bar"><div class="short-prog-fill" id="pf-${i}"></div></div>
      </div>`;

    feed.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'sdot' + (i===0?' active':'');
    dot.id = `dot-${i}`;
    dots.appendChild(dot);
  });

  // ─── INTERSECTION OBSERVER ───
  // threshold 0.75 = slide must be 75% visible before triggering
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const idx = parseInt(e.target.dataset.idx);
      if (e.isIntersecting) {
        currentIdx = idx;
        updateDots(idx);
        if (unlocked && !paused) playSlide(idx);
      } else {
        stopSlide(idx);
      }
    });
  }, { threshold: 0.75 });

  document.querySelectorAll('.short-slide').forEach(el => io.observe(el));
}

// ─── PLAY A SLIDE ───
function playSlide(idx) {
  const item = shorts[idx];
  if (!item) return;
  const id   = item.id.videoId;
  const wrap = document.getElementById(`iw-${idx}`);
  if (!wrap) return;

  const existing = wrap.querySelector('iframe');
  if (existing) {
    // Already loaded → just send play command
    postCmd(existing, 'playVideo');
    startProgress(idx);
    return;
  }

  // Build embed URL
  // autoplay=1 works because user has already interacted (tapped the overlay)
  // mute=1 initially to guarantee play; we unmute right after load if not muted by user
  const src = [
    `https://www.youtube.com/embed/${id}`,
    `?autoplay=1`,
    `&mute=1`,           // start muted → unmute after load (avoids autoplay block)
    `&loop=1`,
    `&playlist=${id}`,
    `&controls=0`,
    `&rel=0`,
    `&playsinline=1`,
    `&modestbranding=1`,
    `&enablejsapi=1`,
    `&origin=${encodeURIComponent(location.origin)}`
  ].join('');

  const iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
  iframe.allowFullscreen = true;
  iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
  iframe.dataset.loaded = '0';

  iframe.addEventListener('load', () => {
    if (iframe.dataset.loaded === '1') return;
    iframe.dataset.loaded = '1';

    // Hide thumbnail
    const tl = document.getElementById(`tl-${idx}`);
    if (tl) tl.classList.add('hidden');

    // Unmute unless user has global mute on
    if (!muted) {
      setTimeout(() => postCmd(iframe, 'unMute'), 600);
    }

    updateMuteBadges();
    startProgress(idx);
  });

  wrap.appendChild(iframe);
}

// ─── STOP (pause) A SLIDE WHEN IT LEAVES VIEW ───
function stopSlide(idx) {
  const iframe = document.getElementById(`iw-${idx}`)?.querySelector('iframe');
  if (iframe) postCmd(iframe, 'pauseVideo');
  // reset progress
  const pf = document.getElementById(`pf-${idx}`);
  if (pf) { pf.style.transition='none'; pf.style.width='0%'; }
}

// ─── POSTMESSAGE TO IFRAME (YouTube IFrame API) ───
function postCmd(iframe, func, args=[]) {
  try {
    iframe.contentWindow.postMessage(JSON.stringify({ event:'command', func, args }), '*');
  } catch(_) {}
}

// ─── PROGRESS BAR ANIMATION ───
function startProgress(idx) {
  const pf = document.getElementById(`pf-${idx}`);
  if (!pf) return;
  pf.style.transition = 'none';
  pf.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    pf.style.transition = 'width 58s linear';
    pf.style.width = '100%';
  }));
}

// ─── DOTS ───
function updateDots(idx) {
  document.querySelectorAll('.sdot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

// ─── MUTE ───
function toggleMute() {
  muted = !muted;
  const icon = document.querySelector('#muteBtn i');
  if (icon) icon.className = muted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
  document.getElementById('muteBtn').classList.toggle('muted', muted);

  const iframe = document.getElementById(`iw-${currentIdx}`)?.querySelector('iframe');
  if (iframe) postCmd(iframe, muted ? 'mute' : 'unMute');

  updateMuteBadges();
  VTX.toast(muted ? '🔇 Muted' : '🔊 Unmuted', 'info');
}

function updateMuteBadges() {
  document.querySelectorAll('[id^="mb-"]').forEach(b => b.classList.toggle('hidden', !muted));
}

// ─── PAUSE/RESUME ───
function togglePause() {
  paused = !paused;
  document.getElementById('pauseIcon').className = paused ? 'fas fa-play' : 'fas fa-pause';
  const iframe = document.getElementById(`iw-${currentIdx}`)?.querySelector('iframe');
  if (iframe) postCmd(iframe, paused ? 'pauseVideo' : 'playVideo');

  // Flash icon
  const flash = document.getElementById(`ppf-${currentIdx}`);
  const ficon = document.getElementById(`ppi-${currentIdx}`);
  if (flash && ficon) {
    ficon.innerHTML = paused ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
    flash.classList.remove('show');
    void flash.offsetWidth;
    flash.classList.add('show');
  }
  VTX.toast(paused ? '⏸ Paused' : '▶ Playing', 'info');
}

// ─── NAVIGATE ───
function navigateShort(dir) {
  const slides = document.querySelectorAll('.short-slide');
  const next = Math.max(0, Math.min(slides.length-1, currentIdx+dir));
  slides[next]?.scrollIntoView({ behavior:'smooth' });
}

// ─── THUMB TAP ───
function onThumbTap(idx) {
  if (!unlocked) { unlockAndPlay(); return; }
  playSlide(idx);
}

// ─── ACTIONS ───
function likeShort(i, e) {
  e?.stopPropagation();
  const btn = document.getElementById(`lbtn-${i}`);
  const liked = btn.classList.toggle('liked');
  btn.querySelector('i').className = liked ? 'fas fa-heart' : 'far fa-heart';
  VTX.toast(liked ? '❤ Liked!' : 'Removed like', 'success');
}
function shareShort(id, e) {
  e?.stopPropagation();
  navigator.clipboard?.writeText(`https://view-tube-x.vercel.app/player.html?v=${id}`)
    .then(() => VTX.toast('🔗 Link copied!', 'success'));
}
function subShort(i, e) {
  e?.stopPropagation();
  const btn = document.getElementById(`sb-${i}`);
  btn.classList.toggle('subbed');
  btn.textContent = btn.classList.contains('subbed') ? '✓ Subscribed' : 'Subscribe';
  VTX.toast(btn.classList.contains('subbed') ? '🔔 Subscribed!' : 'Unsubscribed', 'success');
}

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  if (e.key==='ArrowDown'||e.key==='j') navigateShort(1);
  if (e.key==='ArrowUp'||e.key==='k') navigateShort(-1);
  if (e.key===' '||e.key==='p') { e.preventDefault(); togglePause(); }
  if (e.key==='m') toggleMute();
});

// ─── SWIPE ───
let ty = 0;
const feed = document.getElementById('shortsFeed');
feed?.addEventListener('touchstart', e => ty=e.touches[0].clientY, {passive:true});
feed?.addEventListener('touchend', e => {
  const dy = ty - e.changedTouches[0].clientY;
  if (Math.abs(dy)>60) navigateShort(dy>0?1:-1);
}, {passive:true});

loadShorts();
</script>
</body>
</html>
